# Blueprint Metadata
blueprint:
  name: Controller - IKEA E2001/E2002 STYRBAR Remote control
  description: |
    # Controller - IKEA E2001/E2002 STYRBAR Remote control

    ℹ️ Version 2026.05.20

    Controller automation for executing any kind of action triggered by the provided IKEA E2001/E2002 STYRBAR Remote control.
    Allows to optionally loop an action on a button long press.
    The blueprint also adds support for virtual double button press events, which are not enabled by the controller device itself. However, It needs to be enabled in the blueprint.
    Supports Zigbee2MQTT, ZHA, deCONZ.

    Automations created with this blueprint can be connected with one or more [Hooks](https://yarafie.github.io/awesome-ha-blueprints/docs/blueprints/hooks) supported by this controller.
    Hooks allow to easily create controller-based automations for interacting with lights, covers, media players, and potentially more.
    See the list of [Hooks available for this controller](https://yarafie.github.io/awesome-ha-blueprints/docs/blueprints/controllers/ikea_e2001_e2002/EPMatt/awesome/2026.05.20#available-hooks) for additional details.

    ## More Info

    📝 [Changelog](https://yarafie.github.io/awesome-ha-blueprints/docs/blueprints/controllers/ikea_e2001_e2002/EPMatt/awesome/2026.05.20#changelog)
    📕 Full documentation regarding this blueprint is available [here](https://yarafie.github.io/awesome-ha-blueprints/docs/blueprints/controllers/ikea_e2001_e2002).

    🚀 This blueprint is part of the **[Awesome HA Blueprints](https://yarafie.github.io/awesome-ha-blueprints) project**. Please consider **[leaving a star on GitHub](https://github.com/yarafie/awesome-ha-blueprints)**! 🌟

  source_url: https://raw.githubusercontent.com/yarafie/awesome-ha-blueprints/main/blueprints/controllers/ikea_e2001_e2002/EPMatt/awesome/2026.05.20/ikea_e2001_e2002.yaml
  domain: automation
  homeassistant:
    min_version: 2024.10.0
  # Device Selector
  input:
    controller_device:
      name: (Required) (Zigbee2MQTT, ZHA, deCONZ) Controller Device
      description: The controller device to use for the automation. Choose a value only if the remote is integrated with Zigbee2MQTT, ZHA, deCONZ.
      default: ''
      selector:
        # source: https://zigbee.blakadder.com/Ikea_E2002.html
        device:
          filter:
            # source: https://www.zigbee2mqtt.io/devices/E2001_E2002.html#ikea-e2001-e2002
            - integration: mqtt
              manufacturer: IKEA
              model: STYRBAR remote control
            # For backwards compatibility with z2m 1.x. model_id is added to end of model rather than a seperate attribute in z2m 2.x
            - integration: mqtt
              manufacturer: IKEA
              model: STYRBAR remote control (E2001/E2002)
            # STYRBAR (Z2M) – include additional common variants
            - integration: mqtt
              manufacturer: IKEA
              model: E2001/E2002
            - integration: mqtt
              manufacturer: IKEA
              model: Remote Control N2
            # source: https://github.com/zigpy/zha-device-handlers/blob/dev/zhaquirks/ikea/fourbtnremote.py
            - integration: zha
              manufacturer: IKEA of Sweden
              model: Remote Control N2
            # source: https://github.com/dresden-elektronik/deconz-rest-plugin/blob/master/devices/ikea/styrbar_remote_control.json
            - integration: deconz
              manufacturer: IKEA of Sweden
              model: Remote Control N2
          multiple: false
    # General Helpers Section
    general_helpers_section:
      name: General Helpers
      icon: mdi:remote
      collapsed: false
      input:
        helper_last_controller_event:
          name: (Required) Helper - Last Controller Event
          description: Input Text used to store the last event fired by the controller. You will need to manually create a text input entity for this, please read the blueprint Additional Notes for more info.
          default: ''
          selector:
            entity:
              domain: input_text
        helper_debounce_delay:
          name: (Optional) Helper - Debounce delay
          description:
            Delay used for debouncing RAW controller events, by default set to 0. A value of 0 disables the debouncing feature. Increase this value if you notice custom actions or linked Hooks running multiple times when interacting with the device. When the controller needs to be debounced,
            usually a value of 100 is enough to remove all duplicate events.
          default: 0
          selector:
            number:
              min: 0
              max: 1000
              unit_of_measurement: milliseconds
              mode: box
              step: 10
    # inputs for custom actions
    action_button_up_short:
      name: (Optional) Up button short press
      description: Action to run on short up button press.
      default: []
      selector:
        action:
    action_button_up_long:
      name: (Optional) Up button long press
      description: Action to run on long up button press.
      default: []
      selector:
        action:
    action_button_up_double:
      name: (Optional) (Virtual) Up button double press
      description: Action to run on double up button press.
      default: []
      selector:
        action:
    action_button_up_release:
      name: (Optional) Up button release
      description: Action to run on up button release after long press.
      default: []
      selector:
        action:
    action_button_down_short:
      name: (Optional) Down button short press
      description: Action to run on short down button press.
      default: []
      selector:
        action:
    action_button_down_long:
      name: (Optional) Down button long press
      description: Action to run on long down button press.
      default: []
      selector:
        action:
    action_button_down_double:
      name: (Optional) (Virtual) Down button double press
      description: Action to run on double down button press.
      default: []
      selector:
        action:
    action_button_down_release:
      name: (Optional) Down button release
      description: Action to run on down button release after long press.
      default: []
      selector:
        action:
    action_button_right_short:
      name: (Optional) Right button short press
      description: Action to run on short right button press.
      default: []
      selector:
        action:
    action_button_right_long:
      name: (Optional) Right button long press
      description: Action to run on long right button press.
      default: []
      selector:
        action:
    action_button_right_double:
      name: (Optional) (Virtual) Right button double press
      description: Action to run on double right button press.
      default: []
      selector:
        action:
    action_button_right_release:
      name: (Optional) Right button release
      description: Action to run on right button release after long press.
      default: []
      selector:
        action:
    action_button_left_short:
      name: (Optional) Left button short press
      description: Action to run on short left button press.
      default: []
      selector:
        action:
    action_button_left_long:
      name: (Optional) Left button long press
      description: Action to run on long left button press.
      default: []
      selector:
        action:
    action_button_left_double:
      name: (Optional) (Virtual) Left button double press
      description: Action to run on double left button press.
      default: []
      selector:
        action:
    action_button_left_release:
      name: (Optional) Left button release
      description: Action to run on left button release after long press.
      default: []
      selector:
        action:
    # inputs for enabling double press events
    double_press_options_section:
      name: Double Press options (Virtual)
      icon: mdi:remote
      collapsed: true
      input:
        button_up_double_press_enabled:
          name: (Optional) (Virtual) Enable up button double press event
          description: Choose whether or not to enable the virtual double press event for the up button. Turn this on if you are providing an action for the up button double press event.
          default: false
          selector:
            boolean:
        button_down_double_press_enabled:
          name: (Optional) (Virtual) Enable down button double press event
          description: Choose whether or not to enable the virtual double press event for the down button. Turn this on if you are providing an action for the down button double press event.
          default: false
          selector:
            boolean:
        button_right_double_press_enabled:
          name: (Optional) (Virtual) Enable right button double press event
          description: Choose whether or not to enable the virtual double press event for the right button. Turn this on if you are providing an action for the right button double press event.
          default: false
          selector:
            boolean:
        button_left_double_press_enabled:
          name: (Optional) (Virtual) Enable left button double press event
          description: Choose whether or not to enable the virtual double press event for the left button. Turn this on if you are providing an action for the left button double press event.
          default: false
          selector:
            boolean:
        # helper used to properly adjust the remote button double press events
        helper_double_press_delay:
          name: (Optional) (Virtual) Helper - Double Press delay
          description: Max delay between the first and the second button press for the double press event. Provide a value only if you are using a double press action. Increase this value if you notice that the double press action is not triggered properly.
          default: 250
          selector:
            number:
              min: 100
              max: 5000
              unit_of_measurement: milliseconds
              mode: box
              step: 10
    # inputs for looping custom actions on long button press events until the corresponding release event is received
    long_press_options_section:
      name: Long Press options
      icon: mdi:remote
      collapsed: true
      input:
        button_up_long_loop_enabled:
          name: (Optional) Up button long press - enable looping until release
          description: Loop the up button action until the button is released.
          default: false
          selector:
            boolean:
        button_up_long_max_loop_repeats:
          name: (Optional) Up button long press - Maximum loop repeats
          description: >-
            Maximum number of repeats for the custom action, when looping is enabled.
            Use it as a safety limit to prevent an endless loop in case the corresponding stop event is not received.
          default: 20
          selector:
            number:
              min: 1
              max: 1000
              mode: slider
              step: 1
        button_down_long_loop_enabled:
          name: (Optional) Down button long press - enable looping until release
          description: Loop the down button action until the button is released.
          default: false
          selector:
            boolean:
        button_down_long_max_loop_repeats:
          name: (Optional) Down button long press - Maximum loop repeats
          description: >-
            Maximum number of repeats for the custom action, when looping is enabled.
            Use it as a safety limit to prevent an endless loop in case the corresponding stop event is not received.
          default: 20
          selector:
            number:
              min: 1
              max: 1000
              mode: slider
              step: 1
        button_right_long_loop_enabled:
          name: (Optional) Right button long press - enable looping until release
          description: Loop the right button action until the button is released.
          default: false
          selector:
            boolean:
        button_right_long_max_loop_repeats:
          name: (Optional) Right button long press - Maximum loop repeats
          description: >-
            Maximum number of repeats for the custom action, when looping is enabled.
            Use it as a safety limit to prevent an endless loop in case the corresponding stop event is not received.
          default: 20
          selector:
            number:
              min: 1
              max: 1000
              mode: slider
              step: 1
        button_left_long_loop_enabled:
          name: (Optional) Left button long press - enable looping until release
          description: Loop the left button action until the button is released.
          default: false
          selector:
            boolean:
        button_left_long_max_loop_repeats:
          name: (Optional) Left button long press - Maximum loop repeats
          description: >-
            Maximum number of repeats for the custom action, when looping is enabled.
            Use it as a safety limit to prevent an endless loop in case the corresponding stop event is not received.
          default: 20
          selector:
            number:
              min: 1
              max: 1000
              mode: slider
              step: 1
        helper_long_press_delay:
          name: (Optional) Helper - Long Press delay
          description: Max delay between the pushing and releasing of a button long press event. Increase this value if you notice that the long press action is not triggered properly.
          default: 250
          selector:
            number:
              min: 100
              max: 5000
              unit_of_measurement: milliseconds
              mode: box
              step: 10
#
# Automation schema
trigger_variables:
  controller_id: !input controller_device
  controller_entities: '{{ device_entities(controller_id) }}'
variables:
  # Controller ID
  controller_id: !input controller_device
  # mapping between actions and integrations
  actions_mapping:
    z2m:
      # source: https://www.zigbee2mqtt.io/devices/E2001_E2002.html#ikea-e2001-e2002
      button_up_short: ['on']
      button_up_long: [brightness_move_up]
      button_up_release: [brightness_stop]
      button_down_short: ['off']
      button_down_long: [brightness_move_down]
      button_down_release: [brightness_stop]
      button_right_short: [arrow_right_click]
      button_right_long: [arrow_right_hold]
      button_right_release: [arrow_right_release]
      button_left_short: [arrow_left_click]
      button_left_long: [arrow_left_hold]
      button_left_release: [arrow_left_release]
    zha:
      # source: https://github.com/zigpy/zha-device-handlers/blob/dev/zhaquirks/ikea/fourbtnremote.py
      button_up_short: ['on']
      button_up_long:
        [
          move_on_off,
          move_with_on_off,
          move_with_on_off_0_83,
          move_with_on_off_MoveMode.Up_83,
        ]
      # Kept first parameter for potential backwards compatibility of previous firmware versions
      button_up_release: [stop, stop_on_off, stop_with_on_off]
      button_down_short: ['off']
      button_down_long: [move, move_1_83, move_MoveMode.Down_83_0_0]
      # Kept first parameter for potential backwards compatibility of previous firmware versions
      button_down_release: [stop, stop_on_off, stop_with_on_off, stop_0_0]
      button_right_short: [press_5_1_256_13_0, press_256_13_0]
      button_right_long: [hold_5_1_3328_0, hold_3328_0]
      button_right_release: [release]
      button_left_short: [press_5_1_257_13_0, press_257_13_0]
      button_left_long: [hold_5_1_3329_0, hold_3329_0]
      button_left_release: [release]
    dcz:
      # source: https://github.com/dresden-elektronik/deconz-rest-plugin/blob/master/devices/ikea/styrbar_remote_control.json
      button_up_short: ['1002']
      button_up_long: ['1001']
      button_up_release: ['1003']
      button_down_short: ['2002']
      button_down_long: ['2001']
      button_down_release: ['2003']
      button_right_short: ['4002']
      button_right_long: ['4001']
      button_right_release: ['4003']
      button_left_short: ['3002']
      button_left_long: ['3001']
      button_left_release: ['3003']
  # Zigbee2MQTT state action, read only from entities belonging to the selected controller device.
  # This avoids MQTT device triggers so the blueprint can load when MQTT is not installed.
  z2m_action: >-
    {%- if trigger.id == 'z2m-action' and trigger.to_state is not none -%}
    {{ trigger.to_state.state }}
    {%- else -%}
    {{ '' }}
    {%- endif -%}
  z2m_valid_actions: >
    {{
      actions_mapping.z2m.button_up_short
      + actions_mapping.z2m.button_up_long
      + actions_mapping.z2m.button_up_release
      + actions_mapping.z2m.button_down_short
      + actions_mapping.z2m.button_down_long
      + actions_mapping.z2m.button_down_release
      + actions_mapping.z2m.button_right_short
      + actions_mapping.z2m.button_right_long
      + actions_mapping.z2m.button_right_release
      + actions_mapping.z2m.button_left_short
      + actions_mapping.z2m.button_left_long
      + actions_mapping.z2m.button_left_release
    }}
  z2m_valid_action: >
    {{
      trigger.id == 'z2m-action'
      and trigger.to_state is not none
      and trigger.to_state.state in z2m_valid_actions
    }}
  # ZHA event details, read only from events for the selected controller device.
  zha_command: >-
    {%- if trigger.id == 'zha-action' and trigger.event.data.device_id == controller_id -%}
    {{ trigger.event.data.command | default('') }}
    {%- else -%}
    {{ '' }}
    {%- endif -%}
  zha_cluster_id: >-
    {%- if trigger.id == 'zha-action' and trigger.event.data.device_id == controller_id -%}
    {{ trigger.event.data.cluster_id | default('') }}
    {%- else -%}
    {{ '' }}
    {%- endif -%}
  zha_endpoint_id: >-
    {%- if trigger.id == 'zha-action' and trigger.event.data.device_id == controller_id -%}
    {{ trigger.event.data.endpoint_id | default('') }}
    {%- else -%}
    {{ '' }}
    {%- endif -%}
  zha_args: >-
    {%- if trigger.id == 'zha-action' and trigger.event.data.device_id == controller_id -%}
    {{ trigger.event.data.args | default([]) }}
    {%- else -%}
    {{ [] }}
    {%- endif -%}
  # deCONZ event code, read only from events for the selected controller device.
  dcz_event: >-
    {%- if trigger.id == 'dcz-action' and trigger.event.data.device_id == controller_id -%}
    {{ trigger.event.data.event | default('') }}
    {%- else -%}
    {{ '' }}
    {%- endif -%}
  # Normalized trigger id. All supported integrations are mapped to the original trigger ids
  # used by the shared action logic below.
  normalized_trigger_id: >-
    {%- if trigger.id == 'z2m-action' and z2m_valid_action -%}
      {%- if z2m_action == 'on' -%}
      z2m-button-up-short
      {%- elif z2m_action == 'brightness_move_up' -%}
      z2m-button-up-long
      {%- elif z2m_action == 'off' -%}
      z2m-button-down-short
      {%- elif z2m_action == 'brightness_move_down' -%}
      z2m-button-down-long
      {%- elif z2m_action == 'brightness_stop' -%}
      z2m-button-long-release
      {%- elif z2m_action == 'arrow_right_click' -%}
      z2m-button-right-short
      {%- elif z2m_action == 'arrow_right_hold' -%}
      z2m-button-right-long
      {%- elif z2m_action == 'arrow_right_release' -%}
      z2m-button-right-release
      {%- elif z2m_action == 'arrow_left_click' -%}
      z2m-button-left-short
      {%- elif z2m_action == 'arrow_left_hold' -%}
      z2m-button-left-long
      {%- elif z2m_action == 'arrow_left_release' -%}
      z2m-button-left-release
      {%- else -%}
      {{ '' }}
      {%- endif -%}
    {%- elif trigger.id == 'zha-action' -%}
      {%- set args = trigger.event.data.args | default([]) -%}
      {%- if trigger.event.data.device_id != controller_id -%}
      {{ '' }}
      {%- elif zha_command == 'on' and zha_cluster_id | int == 6 and zha_endpoint_id | int == 1 -%}
      zha-button-up-short
      {%- elif zha_command == 'move_with_on_off' and zha_cluster_id | int == 8 and zha_endpoint_id | int == 1 and args == [0, 83] -%}
      zha-button-up-long
      {%- elif zha_command == 'stop_with_on_off' and zha_cluster_id | int == 8 and zha_endpoint_id | int == 1 -%}
      zha-button-up-release
      {%- elif zha_command == 'off' and zha_cluster_id | int == 6 and zha_endpoint_id | int == 1 -%}
      zha-button-down-short
      {%- elif zha_command == 'move' and zha_cluster_id | int == 8 and zha_endpoint_id | int == 1 and args == [1, 83, 0, 0] -%}
      zha-button-down-long
      {%- elif zha_command == 'stop' and zha_cluster_id | int == 8 and zha_endpoint_id | int == 1 -%}
      zha-button-down-release
      {%- elif zha_command == 'press' and zha_cluster_id | int == 5 and zha_endpoint_id | int == 1 and args == [256, 13, 0] -%}
      zha-button-right-short
      {%- elif zha_command == 'hold' and zha_cluster_id | int == 5 and zha_endpoint_id | int == 1 and args == [3328, 0] -%}
      zha-button-right-long
      {%- elif zha_command == 'press' and zha_cluster_id | int == 5 and zha_endpoint_id | int == 1 and args == [257, 13, 0] -%}
      zha-button-left-short
      {%- elif zha_command == 'hold' and zha_cluster_id | int == 5 and zha_endpoint_id | int == 1 and args == [3329, 0] -%}
      zha-button-left-long
      {%- elif zha_command == 'release' -%}
      zha-button-arrows-release
      {%- else -%}
      {{ '' }}
      {%- endif -%}
    {%- elif trigger.id == 'dcz-action' -%}
      {%- if trigger.event.data.device_id != controller_id -%}
      {{ '' }}
      {%- elif dcz_event | string == '1002' -%}
      dcz-button-up-short
      {%- elif dcz_event | string == '1001' -%}
      dcz-button-up-long
      {%- elif dcz_event | string == '1003' -%}
      dcz-button-up-release
      {%- elif dcz_event | string == '2002' -%}
      dcz-button-down-short
      {%- elif dcz_event | string == '2001' -%}
      dcz-button-down-long
      {%- elif dcz_event | string == '2003' -%}
      dcz-button-down-release
      {%- elif dcz_event | string == '4002' -%}
      dcz-button-right-short
      {%- elif dcz_event | string == '4001' -%}
      dcz-button-right-long
      {%- elif dcz_event | string == '4003' -%}
      dcz-button-right-release
      {%- elif dcz_event | string == '3002' -%}
      dcz-button-left-short
      {%- elif dcz_event | string == '3001' -%}
      dcz-button-left-long
      {%- elif dcz_event | string == '3003' -%}
      dcz-button-left-release
      {%- else -%}
      {{ '' }}
      {%- endif -%}
    {%- else -%}
    {{ '' }}
    {%- endif -%}
  # integration id used to select items in the action mapping
  integration_id: '{{ normalized_trigger_id.split("-")[0] if normalized_trigger_id not in ["", none] else "" }}'
  # convert input tags to variables, to be used in templates
  button_up_double_press_enabled: !input button_up_double_press_enabled
  button_up_long_loop_enabled: !input button_up_long_loop_enabled
  button_up_long_max_loop_repeats: !input button_up_long_max_loop_repeats
  button_down_double_press_enabled: !input button_down_double_press_enabled
  button_down_long_loop_enabled: !input button_down_long_loop_enabled
  button_down_long_max_loop_repeats: !input button_down_long_max_loop_repeats
  button_right_double_press_enabled: !input button_right_double_press_enabled
  button_right_long_loop_enabled: !input button_right_long_loop_enabled
  button_right_long_max_loop_repeats: !input button_right_long_max_loop_repeats
  button_left_double_press_enabled: !input button_left_double_press_enabled
  button_left_long_loop_enabled: !input button_left_long_loop_enabled
  button_left_long_max_loop_repeats: !input button_left_long_max_loop_repeats
  # helpers
  helper_last_controller_event: !input helper_last_controller_event
  helper_debounce_delay: !input helper_debounce_delay
  helper_long_press_delay: !input helper_long_press_delay
  helper_double_press_delay: !input helper_double_press_delay
  # adjusted debounce delay so that the resulting double press delay is exactly as specified by the user when running the action, taking also account of debouncing
  # make sure it never goes below the minimum double press delay
  adjusted_double_press_delay: '{{ [helper_double_press_delay - helper_debounce_delay, 100] | max }}'
  # pre-choose actions for buttons based on configured integration
  # mainly used to pass to hooks through ahb_controller_event
  button_up_short: '{{ actions_mapping[integration_id]["button_up_short"] if integration_id in actions_mapping else [] }}'
  button_up_long: '{{ actions_mapping[integration_id]["button_up_long"] if integration_id in actions_mapping else [] }}'
  button_up_release: '{{ actions_mapping[integration_id]["button_up_release"] if integration_id in actions_mapping else [] }}'
  button_down_short: '{{ actions_mapping[integration_id]["button_down_short"] if integration_id in actions_mapping else [] }}'
  button_down_long: '{{ actions_mapping[integration_id]["button_down_long"] if integration_id in actions_mapping else [] }}'
  button_down_release: '{{ actions_mapping[integration_id]["button_down_release"] if integration_id in actions_mapping else [] }}'
  button_right_short: '{{ actions_mapping[integration_id]["button_right_short"] if integration_id in actions_mapping else [] }}'
  button_right_long: '{{ actions_mapping[integration_id]["button_right_long"] if integration_id in actions_mapping else [] }}'
  button_right_release: '{{ actions_mapping[integration_id]["button_right_release"] if integration_id in actions_mapping else [] }}'
  button_left_short: '{{ actions_mapping[integration_id]["button_left_short"] if integration_id in actions_mapping else [] }}'
  button_left_long: '{{ actions_mapping[integration_id]["button_left_long"] if integration_id in actions_mapping else [] }}'
  button_left_release: '{{ actions_mapping[integration_id]["button_left_release"] if integration_id in actions_mapping else [] }}'
  # integrations which need to store the previous press event to determine which button was released
  integrations_with_prev_event_storage: [z2m, zha]
#
# Mode Block
mode: restart
max_exceeded: silent
#
# Triggers Block
triggers:
  # Generic trigger for Zigbee2MQTT. Uses a state trigger limited to entities belonging
  # to the selected controller device instead of MQTT device triggers, so MQTT does not need
  # to be installed for ZHA/deCONZ users and unrelated state changes do not wake this automation.
  - trigger: state
    id: z2m-action
    entity_id: '{{ controller_entities }}'
  # Generic trigger for ZHA. Specific controller actions are normalized in variables.
  - trigger: event
    id: zha-action
    event_type: zha_event
    event_data:
      device_id: !input controller_device
  # Generic trigger for deCONZ. Specific controller actions are normalized in variables.
  - trigger: event
    id: dcz-action
    event_type: deconz_event
    event_data:
      device_id: !input controller_device
#
# Conditions Block

conditions:
  - condition: and
    conditions:
      # Continue only when the generic integration event matched the selected controller device
      # and was normalized to one of this blueprint's supported actions.
      - condition: template
        value_template: '{{ normalized_trigger_id not in ["", none] }}'
#
# Actions Block

actions:
  #
  # ==============================================================================================================
  # DEBOUNCE SECTION: debouncing - when automation is triggered multiple times,
  # the last automation run is the one which completes execution, due to mode restart
  # therefore previous runs must wait for the debounce delay before executing any other action
  # if the delay expires and the automation is still running it means it's the last run and execution can continue
  # ==============================================================================================================
  - delay:
      milliseconds: !input helper_debounce_delay
  # =============================
  # CAPTURE CURRENT TRIGGER STATE
  # =============================
  - variables:
      # Use normalized_trigger_id as the normalized action name
      # Example: z2m-button-up-short → "button-up-short"
      trigger_action: "{{ normalized_trigger_id.split('-', 1)[1] }}"
      # Deserialize stored helper state if valid JSON, else use defaults
      deserialized_state: '{{ (states(helper_last_controller_event) | from_json) if helper_last_controller_event is not none and (states(helper_last_controller_event) | regex_match("^\{\s*?((\"a\":\s*?\".*\"|\"t\":\s*?\d+\.\d+)(,\s*?)?){2}\s*?\}$")) else {} }}'
      # Extract previous action name for comparison
      last_controller_event: "{{ deserialized_state.a | default('') }}"
      # Calculate time delta between current and last event
      # trigger_delta: '{{ (as_timestamp(now()) - (deserialized_state.t | default(0))) * 1000 }}'
      trigger_delta: '{{ (as_timestamp(now()) - (deserialized_state.t | default(0))) * 1000 | int }}'
  # ==========================================
  # STORE CURRENT EVENT (ALWAYS UPDATE HELPER)
  # ==========================================
  - action: input_text.set_value
    data:
      entity_id: !input helper_last_controller_event
      value: '{{ {"a":trigger_action,"t":as_timestamp(now())} | to_json }}'
  # ===================================================
  # DECISION LOGIC – CHOOSE WHAT TO DO BASED ON TRIGGER
  # ===================================================
  - choose:
      # =========================================================
      # Actions for Up Button Single Press / Double Press Virtual
      # =========================================================
      - conditions:
          - condition: template
            value_template: "{{ normalized_trigger_id in ['z2m-button-up-short', 'zha-button-up-short', 'dcz-button-up-short'] }}"
        sequence:
          # Update helper for last event tracking
          - action: input_text.set_value
            data:
              entity_id: !input helper_last_controller_event
              value: '{{ {"a": trigger_action, "t": as_timestamp(now())} | to_json }}'
          - choose:
              # Check if Double press feature enabled
              - conditions: '{{ button_up_double_press_enabled }}'
                sequence:
                  - choose:
                      # Detected a double press (same action + within delay)
                      - conditions: '{{ trigger_action == last_controller_event and (trigger_delta | int) <= (helper_double_press_delay | int) }}'
                        sequence:
                          # Store "trigger_action" in helper
                          - action: input_text.set_value
                            data:
                              entity_id: !input helper_last_controller_event
                              value: '{{ {"a": trigger_action, "t": as_timestamp(now())} | to_json }}'
                          # Fire a double-press event
                          - event: ahb_controller_event
                            event_data:
                              controller: '{{ controller_id }}'
                              action: button_up_double
                          # Run user-defined double press actions
                          - choose:
                              - conditions: []
                                sequence: !input action_button_up_double
                    # If no double press detected — fallback to single
                    default:
                      # After delay expires → single short press
                      - delay:
                          milliseconds: '{{ adjusted_double_press_delay }}'
                      # Fire a single-press event
                      - event: ahb_controller_event
                        event_data:
                          controller: '{{ controller_id }}'
                          action: button_up_short
                      # Run user-defined single press actions
                      - choose:
                          - conditions: []
                            sequence: !input action_button_up_short
            # Double press feature disabled → single short press only
            default:
              # Fire a single-press event
              - event: ahb_controller_event
                event_data:
                  controller: '{{ controller_id }}'
                  action: button_up_short
              # Run user-defined single press actions
              - choose:
                  - conditions: []
                    sequence: !input action_button_up_short
